name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build, Vet & Test (Postgres)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: xolto
          POSTGRES_PASSWORD: xoltotest
          POSTGRES_DB: xolto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_POSTGRES_DSN: postgres://xolto:xoltotest@localhost:5432/xolto_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (store package, verbose for Postgres integration logs)
        run: go test -v -race -count=1 ./internal/store/...

      - name: Test (full suite)
        run: go test -race -count=1 ./...
